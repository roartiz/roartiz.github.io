<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lens & Horizon | Photography & Videography</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --card-bg: #141414;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000; /* True black background for stacking layers */
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: var(--transition);
            opacity: 0.7;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        /* --- STICKY STACKING MECHANICS --- */
        .stack-section {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-color);
            transform-origin: center center;
            transition: transform 0.1s linear, opacity 0.1s linear;
            overflow: hidden;
        }

        /* Hero Section (Split Screen) */
        #hero-section {
            display: flex;
            flex-direction: row;
            z-index: 1;
        }

        .hero-side {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

        .side-ground {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1200&q=80');
        }

        .side-drone {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1508614589041-895b88991e3e?auto=format&fit=crop&w=1200&q=80');
        }

        .hero-side:hover {
            flex: 1.3;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            transition: var(--transition);
        }

        .hero-content i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 1rem;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* Portfolio Section */
        #work-section {
            z-index: 2;
            height: auto;
            min-height: 100vh;
            position: relative; 
            padding: 120px 50px 100px 50px;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Filter Tabs */
        .filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }
