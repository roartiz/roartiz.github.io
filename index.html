<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOARTIZ MEDIA | Photo & Video | Camera + Drone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. DESIGN SYSTEM & CORE GLOBAL STYLES
           ========================================================================== */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --card-bg: #141414;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            --zoom-transition: transform 3s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ==========================================================================
           2. LAYOUT ENGINE (STICKY SCROLL STACKING)
           ========================================================================== */
        .stack-section {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-color);
            transform-origin: center center;
            transition: transform 0.1s linear, opacity 0.1s linear;
            overflow: hidden;
        }

        /* ==========================================================================
           3. SITE NAVIGATION LAYER
           ========================================================================== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .tagline {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            margin-top: 6px;
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
            padding: 4px 0;
            opacity: 0.85;
            transition: var(--transition);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: var(--transition);
            transform: translateX(-50%);
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* ==========================================================================
           4. SPLIT HERO COMPONENT (CINEMATIC FRAMELESS EDITION)
           ========================================================================== */
        #hero-section {
            display: flex;
            flex-direction: column; /* Changed to hold both the band and the split container */
            justify-content: flex-start;
            z-index: 1;
        }

        .hero-split-container {
            display: flex;
            flex-direction: row;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .hero-side {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            cursor: pointer;
            overflow: hidden;
        }

        .hero-side.side-ground {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .image-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: grayscale(25%) contrast(95%);
            transition: var(--zoom-transition);
            z-index: 1;
        }

        .side-ground .image-layer {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('/assets/images/z63.jpg?auto=format&fit=crop&w=1200&q=80');
        }

        .side-drone .image-layer {
            background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0.6) 100%), url('/assets/images/droneFleet.jpg?auto=format&fit=crop&w=1200&q=80');
        }

        .hero-side:hover {
            flex: 1.1;
        }

        .hero-side:hover .image-layer {
            transform: scale(1.04);
            filter: grayscale(0%) contrast(100%);
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            transition: var(--transition);
            pointer-events: none;
            background: transparent; 
            padding: 20px;
            max-width: 380px;
            width: 90%;
        }

        .hero-content i {
            font-size: 2.4rem;
            margin-bottom: 14px;
            color: #ffffff;
            transition: var(--transition);
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
        }

        .hero-side:hover .hero-content i {
            color: var(--accent-color);
            transform: translateY(-4px);
        }

        .hero-content h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 4px 14px rgba(0,0,0,0.8);
            position: relative;
            display: inline-block;
            padding-bottom: 12px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            animation: slideUpReveal 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transition: font-weight 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        letter-spacing 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes slideUpReveal {
            from {
                transform: translateY(60%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hero-side:hover .hero-content h1 {
            font-weight: 700;
            letter-spacing: 6px;
        }

        .hero-content h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 35px;
            height: 2px;
            background-color: var(--accent-color);
            transform: translateX(-50%);
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.5);
        }

        .hero-side:hover .hero-content h1::after {
            width: 90px;
        }

        .hero-content p {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 14px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.9);
        }

        /* ==========================================================================
           5. PORTFOLIO WORK INTERACTION GRID
           ========================================================================== */
        #work-section {
            z-index: 2;
            height: auto;
            min-height: 100vh;
            position: relative;
            padding: 140px 50px 100px 50px;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-color);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
        }

        .grid-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .grid-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--accent-color);
            border-image: linear-gradient(to right, var(--accent-color), rgba(52, 152, 219, 0.1)) 1;
            opacity: 0;
            transform: scale(0.97);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.4s ease;
            z-index: 4;
            pointer-events: none;
        }

        .grid-item:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .grid-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .grid-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: var(--transition);
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 250px;
            background-color: var(--card-bg); 
            overflow: hidden;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
            pointer-events: none; 
        }

        .item-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: var(--transition);
            z-index: 3;
            pointer-events: none;
        }

        .grid-item:hover .item-overlay {
            opacity: 1;
        }

        .item-overlay h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .item-overlay span {
            font-size: 0.8rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* ==========================================================================
           6. CLIENT TESTIMONIALS SLIDER BACKDROP
           ========================================================================== */
        #testimonials-section {
            z-index: 3;
            background-color: #080808;
            padding: 100px 50px;
            display: flex;
            flex-direction:
